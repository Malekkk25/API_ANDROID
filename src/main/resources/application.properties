spring.application.name=ANDROID_PROJECT

server.port=${PORT:8080}

# ? PostgreSQL ? Railway injecte DATABASE_URL automatiquement
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# ? Pas besoin de username/password sťparťs ? inclus dans DATABASE_URL
# Si Railway ne les injecte pas automatiquement, ajoute :
# spring.datasource.username=${PGUSER}
# spring.datasource.password=${PGPASSWORD}

# ? Dialecte PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# ? Pool de connexions Hikari
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.maximum-pool-size=5

spring.web.cors.allowed-origins=*